{% block "base" %}
<!DOCTYPE html>
<html lang="{{ base.locale | default:"pt-BR" }}" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title | default:"SpiderStack" }}</title>
  <link href="/css/app.css" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#facc15">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script src="/htmx.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
    }
   </script>
</head>
<body x-data="{ drawerOpen: false }" @htmx:after-swap.window="drawerOpen = false" class="bg-zinc-950 text-white min-h-screen pb-20 lg:pb-0">

  {% include "partials_topbar" %}
  {% include "partials_drawer" %}
  {% include "partials_sidebar" %}

  <main id="main" class="lg:ml-72 pt-14 lg:pt-8 p-4 lg:p-8 min-h-screen">
    <!-- <div id="page-skeleton" class="htmx-indicator space-y-4 p-4"> -->
    <!--   <div class="bg-zinc-800 rounded-3xl h-48 animate-pulse"></div> -->
    <!--   <div class="bg-zinc-800 rounded-3xl h-32 animate-pulse"></div> -->
    <!--   <div class="bg-zinc-800 rounded-3xl h-32 animate-pulse"></div> -->
    <!-- </div> -->
    {% template "content" %}
  </main>

  {% include "partials_bottom_nav" %}

</body>
</html>
{% end %}
