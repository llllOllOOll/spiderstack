<!-- Mobile Drawer -->
<div x-show="drawerOpen" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed inset-0 z-50 lg:hidden"
     style="display: none;">

  <!-- Overlay -->
  <div x-show="drawerOpen"
       @click="drawerOpen = false"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       class="absolute inset-0 bg-black/60 backdrop-blur-sm"
       style="display: none;"></div>

  <!-- Drawer Panel -->
  <div x-show="drawerOpen"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="-translate-x-full"
       x-transition:enter-end="translate-x-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="translate-x-0"
       x-transition:leave-end="-translate-x-full"
       class="absolute left-0 top-0 bottom-0 w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col shadow-2xl"
       style="display: none;">
    
    <!-- Header -->
    <div class="flex items-center justify-between p-4 border-b border-zinc-800">
      <span class="font-bold text-lg">Menu</span>
      <button @click="drawerOpen = false" class="p-2 hover:bg-zinc-800 rounded-xl">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- User Info -->
    <div class="p-4">
      <div class="flex items-center gap-3 p-3 bg-zinc-800 rounded-2xl">
        <div class="w-10 h-10 rounded-2xl bg-yellow-400 flex items-center justify-center text-zinc-950 font-bold text-xl">
          {{ base.user_initials | default:"G" }}
        </div>
        <div>
          <div class="font-medium">{{ base.user_name | default:"Guest" }}</div>
          <div class="text-xs text-zinc-400">{{ base.user_email | default:"user@email.com" }}</div>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-yellow-400" hx-get="/" hx-target="#main" hx-push-url="true" @click="drawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M4.5 10.5V20a1 1 0 001 1h4v-5h5v5h4a1 1 0 001-1V10.5"/>
        </svg>
        <span>{{ base.nav_overview }}</span>
      </a>

      <a href="/profile" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400 hover:text-white" hx-get="/profile" hx-target="#main" hx-push-url="true" @click="drawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
        <span>{{ base.nav_profile }}</span>
      </a>

      <a href="/todo" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400 hover:text-white" hx-get="/todo" hx-target="#main" hx-push-url="true" @click="drawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        <span>Todo</span>
      </a>

      <a href="/games" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400 hover:text-white" hx-get="/games" hx-target="#main" hx-push-url="true" @click="drawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915a1 1 0 01.59 1.715l-2.597 2.485a1 1 0 00-.39 1.037l1.11 4.54a1 1 0 01-1.514 1.115l-3.573-2.196a1 1 0 00-1.037 0l-3.573 2.196a1 1 0 01-1.514-1.115l1.11-4.54a1 1 0 00-.39-1.037l-2.597-2.485a1 1 0 01.59-1.715h4.915a1 1 0 00.95-.69l1.519-4.674z"/>
        </svg>
        <span>Games</span>
      </a>

      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400 hover:text-white" @click="drawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
        </svg>
        <span>{{ base.nav_search }}</span>
      </a>

      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-zinc-400 hover:text-white" @click="drawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>{{ base.nav_settings }}</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="p-3 border-t border-zinc-800">
      <a href="/logout" class="flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-zinc-800 text-red-400" @click="drawerOpen = false">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        <span>Logout</span>
      </a>
    </div>

  </div>
</div>
