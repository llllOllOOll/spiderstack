<!-- Add/Edit Game Modal -->
<div x-show="open" x-transition.opacity.duration.300ms
     class="fixed inset-0 z-50 flex items-center justify-center p-4"
     @keydown.escape.window="open = false"
     style="display: none;">
  <div class="absolute inset-0 bg-zinc-950/80 backdrop-blur-sm" @click="open = false"></div>
  
  <div class="relative bg-zinc-900 rounded-2xl p-6 w-full max-w-sm border border-zinc-800 shadow-2xl" @click.stop>
    
    <form :hx-post="game.id ? '/games/'+game.id+'/update' : '/games/create'" hx-target="#main" class="space-y-4">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-lg font-semibold text-yellow-400">Add/Edit Game</h2>
        <button type="button" @click="open = false" class="text-zinc-600 hover:text-zinc-400 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <input type="hidden" name="id" :value="game.id">

      <div>
        <label class="block text-zinc-400 text-xs font-medium mb-1.5">Name</label>
        <input type="text" name="name" x-model="game.name" required
               class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 text-white text-sm">
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-zinc-400 text-xs font-medium mb-1.5">Platform</label>
          <input type="text" name="platform" x-model="game.platform" required
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 text-white text-sm">
        </div>
        <div>
          <label class="block text-zinc-400 text-xs font-medium mb-1.5">Year</label>
          <input type="number" name="release_year" x-model="game.year" required
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 text-white text-sm">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-zinc-400 text-xs font-medium mb-1.5">Genre</label>
          <input type="text" name="genre" x-model="game.genre" required
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 text-white text-sm">
        </div>
        <div>
          <label class="block text-zinc-400 text-xs font-medium mb-1.5">Developer</label>
          <input type="text" name="developer" x-model="game.developer" required
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 text-white text-sm">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-zinc-400 text-xs font-medium mb-1.5">Sales (M)</label>
          <input type="number" step="0.01" name="sales_millions" x-model="game.sales"
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 text-white text-sm">
        </div>
        <div>
          <label class="block text-zinc-400 text-xs font-medium mb-1.5">Rating</label>
          <input type="number" step="0.1" max="10" name="rating" x-model="game.rating"
                 class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2.5 text-white text-sm">
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="flex-1 bg-yellow-400 hover:bg-yellow-300 text-zinc-950 font-semibold py-2.5 rounded-xl text-sm">
          Save
        </button>
        <button type="button" @click="open = false"
                class="px-5 py-2.5 text-zinc-400 hover:text-white text-sm">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
